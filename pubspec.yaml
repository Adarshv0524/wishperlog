name: wishperlog
description: "My awesome voice logger app."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  get_it: ^9.2.1
  go_router: ^17.2.0
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  google_sign_in: ^6.3.0
  cloud_firestore: ^6.2.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  path_provider: ^2.1.5
  speech_to_text: ^7.3.0
  shared_preferences: ^2.5.3
  google_generative_ai: ^0.4.7
  googleapis: ^14.0.0
  http: ^1.5.0
  url_launcher: ^6.3.2
  flutter_dotenv: ^6.0.0
  workmanager: ^0.9.0+3
  connectivity_plus: ^7.1.0
  firebase_messaging: ^16.0.2
  flutter_svg: ^2.2.0
  permission_handler: ^11.0.1
  provider: ^6.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.6
  isar_generator: ^3.1.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/icons/
