name: Flutter tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create empty .env for tests
        run: : > .env

      - name: Install dependencies
        run: flutter pub get

      - name: Run tests
        run: flutter test
