<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="description" content="My awesome voice logger app.">
  <meta name="google-signin-client_id" content="982731246537-6a8ov59qm6n6f6v7rakq4su2eje8g9au.apps.googleusercontent.com">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="wishperlog">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>wishperlog</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow-x: hidden;
      background: linear-gradient(135deg, #0b1118 0%, #161b22 100%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      color: #c9d1d9;
    }

    body {
      min-height: 100dvh;
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      touch-action: manipulation;
      background-attachment: fixed;
    }

    #flutter-host {
      width: 100%;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Smooth scroll behavior */
    html {
      scroll-behavior: smooth;
    }

    /* Custom scrollbar - enhanced */
    ::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }
    ::-webkit-scrollbar-track {
      background: linear-gradient(135deg, #0d1117, #161b22);
    }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(135deg, #30363d, #484f58);
      border-radius: 5px;
      border: 2px solid #0d1117;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(135deg, #484f58, #6e7681);
    }

    /* Firefox scrollbar */
    * {
      scrollbar-color: #30363d #0d1117;
      scrollbar-width: thin;
    }

    /* Text selection styling */
    ::selection {
      background: #388bfd;
      color: white;
      text-shadow: none;
    }
    ::-moz-selection {
      background: #388bfd;
      color: white;
    }

    /* Loading state */
    .flutter-loader {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      background: linear-gradient(135deg, #0b1118 0%, #161b22 100%);
      font-size: 16px;
      color: #8b949e;
      font-weight: 500;
      letter-spacing: 0.5px;
    }

    /* Input fields enhancement - Flutter TextField style */
    input, textarea, select {
      background: rgba(30, 30, 30, 0.6);
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: inherit;
      font-size: 16px;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: #388bfd;
      background: rgba(30, 30, 30, 0.8);
      box-shadow: 0 0 0 3px rgba(56, 139, 253, 0.1), 0 0 12px rgba(56, 139, 253, 0.2);
    }

    input::placeholder, textarea::placeholder {
      color: #6e7681;
    }

    /* Buttons enhancement */
    button {
      background: linear-gradient(135deg, #388bfd 0%, #1f6feb 100%);
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 12px rgba(56, 139, 253, 0.2);
      letter-spacing: 0.3px;
    }

    button:hover {
      background: linear-gradient(135deg, #4a9dff 0%, #2a7de9 100%);
      box-shadow: 0 6px 16px rgba(56, 139, 253, 0.3);
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 8px rgba(56, 139, 253, 0.2);
    }

    button:disabled {
      background: linear-gradient(135deg, #6e7681 0%, #424a50 100%);
      cursor: not-allowed;
      opacity: 0.6;
      box-shadow: none;
    }

    /* Desktop: centered container max 1200px with premium styling */
    @media (min-width: 1024px) {
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      #flutter-host {
        width: 90%;
        max-width: 1200px;
        min-height: 100dvh;
        border-left: 1px solid #30363d;
        border-right: 1px solid #30363d;
        border-radius: 16px;
        box-shadow: 
          0 0 1px rgba(255, 255, 255, 0.05),
          0 20px 60px rgba(0, 0, 0, 0.3),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        animation: fadeInHost 0.6s ease-out;
      }
    }

    /* Tablet: 768-1023px */
    @media (min-width: 768px) and (max-width: 1023px) {
      body {
        padding: 16px;
      }
      #flutter-host {
        width: 95%;
        max-width: 900px;
        border-radius: 12px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
      }
    }

    /* Mobile: full width */
    @media (max-width: 767px) {
      #flutter-host {
        width: 100%;
        border-radius: 0;
        box-shadow: none;
        border: none;
      }
      body {
        padding: 0;
      }
    }

    /* Small mobile optimization */
    @media (max-width: 480px) {
      body {
        font-size: 14px;
      }
      input, textarea, select, button {
        font-size: 16px; /* Prevent iOS zoom on focus */
        padding: 10px 14px;
      }
    }

    /* Medium screens */
    @media (min-width: 481px) and (max-width: 767px) {
      body {
        font-size: 15px;
      }
    }

    /* Larger screens */
    @media (min-width: 768px) {
      body {
        font-size: 16px;
      }
    }

    /* Animation for host fade-in */
    @keyframes fadeInHost {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Smooth transitions for all interactive elements */
    a, button, input, textarea, select {
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Prevent text selection on interactive elements */
    button, input[type="button"], input[type="submit"] {
      user-select: none;
      -webkit-user-select: none;
      -moz-user-select: none;
      -ms-user-select: none;
    }

    /* Focus visible for keyboard navigation */
    *:focus-visible {
      outline: 2px solid #388bfd;
      outline-offset: 2px;
    }

    /* Remove default focus outline on buttons clicked by mouse */
    button:focus:not(:focus-visible),
    input:focus:not(:focus-visible),
    textarea:focus:not(:focus-visible),
    select:focus:not(:focus-visible) {
      outline: none;
    }

    /* Reduce motion for accessibility */
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* Dark mode optimization */
    @media (prefers-color-scheme: dark) {
      html, body {
        color-scheme: dark;
      }
    }

    /* High contrast support */
    @media (prefers-contrast: more) {
      input, textarea, select {
        border-color: #58a6ff;
      }
      button {
        font-weight: 600;
      }
    }
  </style>
</head>
<body>
  <div id="flutter-host"></div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
